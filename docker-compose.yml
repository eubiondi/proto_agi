services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: proto_agi
      POSTGRES_PASSWORD: proto_agi
      POSTGRES_DB: proto_agi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/proto_agi
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
